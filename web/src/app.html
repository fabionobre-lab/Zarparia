<!doctype html>
<html lang="%lang%"%theme-attr%>
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="text-scale" content="scale" />
		<meta name="theme-color" content="#faf6ee" media="(prefers-color-scheme: light)" />
		<meta name="theme-color" content="#16120d" media="(prefers-color-scheme: dark)" />
		<!-- Static defaults for every route — SvelteKit pages set their own
		     <title> via <svelte:head>, which does not conflict with these; there
		     is no per-page Open Graph infrastructure, by design. -->
		<meta
			name="description"
			content="Zarparia — plan and share travel itineraries. Early-access, invite-only beta."
		/>
		<meta property="og:type" content="website" />
		<meta property="og:site_name" content="Zarparia" />
		<meta property="og:title" content="Zarparia — Chart your journey." />
		<meta
			property="og:description"
			content="Zarparia — plan and share travel itineraries. Early-access, invite-only beta."
		/>
		<!-- TODO(Phase 7): swap for the custom domain once it lands. -->
		<meta property="og:image" content="https://trips.fabionobre-ai.workers.dev/icon-512.png" />
		<meta name="twitter:card" content="summary" />
		<script>
			// Belt-and-braces: reconcile <html data-theme> from localStorage before
			// first paint, so a cached/prerendered page whose SSR cookie is stale
			// still renders in the user's chosen theme (no flash). SSR already
			// stamped the attribute from the cookie; this only corrects divergence.
			(function () {
				try {
					var m = localStorage.getItem('trips.theme');
					var el = document.documentElement;
					if (m === 'dark' || m === 'light') el.setAttribute('data-theme', m);
					else if (m === 'system') el.removeAttribute('data-theme');
				} catch (e) {}
			})();
		</script>
		<link rel="manifest" href="/manifest.webmanifest" />
		<link rel="icon" href="/icon-192.png" />
		<link rel="apple-touch-icon" href="/icon-192.png" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link
			href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=Source+Serif+4:opsz,wght@8..60,300;8..60,400;8..60,500&display=swap"
			rel="stylesheet"
		/>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
