<!doctype html>
<html lang="%lang%"%theme-attr%>
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="text-scale" content="scale" />
		<meta name="theme-color" content="#F5F2EC" media="(prefers-color-scheme: light)" />
		<meta name="theme-color" content="#141B28" media="(prefers-color-scheme: dark)" />
		<!-- description + og:*/twitter:card now live in the root layout's
		     svelte:head (src/routes/+layout.svelte), with per-route overrides via
		     $page.data.og — a static tag here couldn't be overridden and would
		     just emit duplicates. See DESIGN-CONSISTENCY-PLAN-R2.md Phase 6 item 1. -->
		<script>
			// Belt-and-braces: reconcile <html data-theme> from localStorage before
			// first paint, so a cached/prerendered page whose SSR cookie is stale
			// still renders in the user's chosen theme (no flash). SSR already
			// stamped the attribute from the cookie; this only corrects divergence.
			(function () {
				try {
					// Migration: 'zarparia.theme' is the current key; 'trips.theme' is
					// the legacy key (pre-Phase-1). Read the new key first, fall back to
					// the old one once, and backfill the new key so future loads skip
					// the fallback. See src/lib/theme/index.ts for the cookie-side twin
					// of this migration.
					var m = localStorage.getItem('zarparia.theme');
					if (m === null) {
						m = localStorage.getItem('trips.theme');
						if (m !== null) localStorage.setItem('zarparia.theme', m);
					}
					var el = document.documentElement;
					if (m === 'dark' || m === 'light') el.setAttribute('data-theme', m);
					else if (m === 'system') el.removeAttribute('data-theme');
					// theme-color must track the pinned theme (DESIGN.md Conventions):
					// the media-filtered metas above only cover system mode. SSR stamps
					// data-theme (hooks.server) but these metas are static, so this
					// pre-paint stamp is the mechanism: when the reconciled theme is
					// pinned, overwrite both metas with the pinned canon --an-bg value
					// (#F5F2EC light / #141B28 dark). On system the static per-media
					// originals already apply. Runtime twin: src/lib/theme/store.svelte.ts.
					var pinned = el.getAttribute('data-theme');
					if (pinned === 'dark' || pinned === 'light') {
						var c = pinned === 'dark' ? '#141B28' : '#F5F2EC';
						document.querySelectorAll('meta[name="theme-color"]').forEach(function (t) {
							t.content = c;
						});
					}
				} catch (e) {}
			})();
		</script>
		<link rel="manifest" href="/manifest.webmanifest" />
		<link rel="icon" href="/icon-192.png" />
		<link rel="apple-touch-icon" href="/icon-192.png" />
		<!-- Fonts are self-hosted via @fontsource (imported in +layout.svelte) —
		     no Google Fonts network request. See DESIGN-CONSISTENCY-PLAN.md
		     Phase 1 / DESIGN.md "Typography." -->
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
