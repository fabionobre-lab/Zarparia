<!doctype html>
<html lang="%lang%"%theme-attr%>
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="text-scale" content="scale" />
		<meta name="theme-color" content="#F5F2EC" media="(prefers-color-scheme: light)" />
		<meta name="theme-color" content="#19150F" media="(prefers-color-scheme: dark)" />
		<!-- Static defaults for every route — SvelteKit pages set their own
		     <title> via <svelte:head>, which does not conflict with these; there
		     is no per-page Open Graph infrastructure, by design. -->
		<meta
			name="description"
			content="Zarparia — plan and share travel itineraries. Early-access, invite-only beta."
		/>
		<meta property="og:type" content="website" />
		<meta property="og:site_name" content="Zarparia" />
		<meta property="og:title" content="Zarparia — Chart your journey." />
		<meta
			property="og:description"
			content="Zarparia — plan and share travel itineraries. Early-access, invite-only beta."
		/>
		<!-- TODO(Phase 7): swap for the custom domain once it lands. -->
		<meta property="og:image" content="https://trips.fabionobre-ai.workers.dev/icon-512.png" />
		<meta name="twitter:card" content="summary" />
		<script>
			// Belt-and-braces: reconcile <html data-theme> from localStorage before
			// first paint, so a cached/prerendered page whose SSR cookie is stale
			// still renders in the user's chosen theme (no flash). SSR already
			// stamped the attribute from the cookie; this only corrects divergence.
			(function () {
				try {
					// Migration: 'zarparia.theme' is the current key; 'trips.theme' is
					// the legacy key (pre-Phase-1). Read the new key first, fall back to
					// the old one once, and backfill the new key so future loads skip
					// the fallback. See src/lib/theme/index.ts for the cookie-side twin
					// of this migration.
					var m = localStorage.getItem('zarparia.theme');
					if (m === null) {
						m = localStorage.getItem('trips.theme');
						if (m !== null) localStorage.setItem('zarparia.theme', m);
					}
					var el = document.documentElement;
					if (m === 'dark' || m === 'light') el.setAttribute('data-theme', m);
					else if (m === 'system') el.removeAttribute('data-theme');
				} catch (e) {}
			})();
		</script>
		<link rel="manifest" href="/manifest.webmanifest" />
		<link rel="icon" href="/icon-192.png" />
		<link rel="apple-touch-icon" href="/icon-192.png" />
		<!-- Fonts are self-hosted via @fontsource (imported in +layout.svelte) —
		     no Google Fonts network request. See DESIGN-CONSISTENCY-PLAN.md
		     Phase 1 / DESIGN.md "Typography." -->
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
