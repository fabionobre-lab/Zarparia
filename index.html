:root{

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:#1e3520}
body{font-family:'Source Serif 4','Georgia',serif;color:var(--ink);-webkit-font-smoothing:antialiased}
.shell{max-width:430px;margin:0 auto;height:100dvh;display:flex;flex-direction:column;background:var(--cream);overflow:hidden}
.shell.london-active{--london-hero:#1e3054;--london-accent:#c17817;--london-dot-primary:#1e3054;--london-dot-secondary:#c84040}
.hero{background:var(--tartan);padding:calc(12px + var(--safe-top)) 16px 0;flex-shrink:0;position:relative;overflow:hidden}
.shell.london-active .hero{background:var(--london-hero)}
.hero::before{content:'';position:absolute;inset:0;pointer-events:none;

  repeating-linear-gradient(90deg,transparent,transparent 18px,rgba(255,255,255,.05) 18px,rgba(255,255,255,.05) 19.5px),
  repeating-linear-gradient(0deg,transparent,transparent 54px,rgba(184,134,11,.16) 54px,rgba(184,134,11,.16) 57px),
  repeating-linear-gradient(90deg,transparent,transparent 54px,rgba(184,134,11,.16) 54px,rgba(184,134,11,.16) 57px)}
.shell.london-active .hero::before{
  background:repeating-linear-gradient(45deg,transparent,transparent 12px,rgba(255,255,255,.08) 12px,rgba(255,255,255,.08) 13px),

.hero-row1{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.trip-eyebrow{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--gold-lt);opacity:.75;font-weight:300}
.shell.london-active .trip-eyebrow{color:var(--london-accent)}
.lang-toggle{display:flex;border-radius:20px;overflow:hidden;border:1px solid rgba(255,255,255,.18)}
.lang-btn{padding:4px 12px;border:none;background:rgba(0,0,0,.2);cursor:pointer;font-size:11px;color:rgba(255,255,255,.5);font-family:'Source Serif 4',serif;letter-spacing:.06em;transition:all .2s;font-weight:400}
.lang-btn.on{background:rgba(255,255,255,.18);color:#fff;font-weight:500}
.trip-title{font-family:'Playfair Display',Georgia,serif;font-size:25px;font-weight:700;color:#fff;line-height:1.05;margin-bottom:1px}
.trip-sub{font-size:11px;color:rgba(255,255,255,.5);font-weight:300;margin-bottom:10px;letter-spacing:.02em}
.vtabs{display:flex;border-radius:10px 10px 0 0;overflow:hidden;gap:1px;background:rgba(0,0,0,.2)}
.vtab{display:none}
.daynav{display:flex;overflow-x:auto;scrollbar-width:none;background:var(--cream);border-bottom:1px solid var(--border);padding:0 4px;flex-shrink:0}
.daynav::-webkit-scrollbar{display:none}
.daybtn{flex:1;min-width:0;padding:7px 3px 5px;border:none;background:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:1px;border-bottom:2.5px solid transparent;transition:all .15s;position:relative}
.daybtn.on{border-bottom-color:var(--tartan)}
.shell.london-active .daybtn.on{border-bottom-color:var(--london-hero)}
.daybtn .dow{font-size:9px;letter-spacing:.05em;text-transform:uppercase;color:var(--stone);font-family:'Source Serif 4',serif;transition:color .15s}
.daybtn .dnum{font-size:15px;font-weight:500;color:var(--stone);font-family:'Playfair Display',serif;line-height:1;transition:color .15s}
.daybtn.on .dow,.daybtn.on .dnum{color:var(--tartan)}
.shell.london-active .daybtn.on .dow,.shell.london-active .daybtn.on .dnum{color:var(--london-hero)}
.bday-pip{width:5px;height:5px;border-radius:50%;background:var(--heather);margin-top:1px;opacity:0}
.daybtn.has-bday .bday-pip{opacity:1}
.daybtn-separator{width:1px;background:var(--border);margin:4px 0;flex-shrink:0}
.scroll-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;padding-bottom:calc(20px + var(--safe-bottom))}
.day-hdr{margin:12px 13px 0;background:var(--tartan);border-radius:13px;padding:13px 15px 12px;position:relative;overflow:hidden}
.shell.london-active .day-hdr{background:var(--london-hero)}

.dh-in{position:relative;z-index:1}

.shell.london-active .dh-eye{color:var(--london-accent)}
.dh-title{font-family:'Playfair Display',serif;font-size:18px;color:#fff;font-weight:700;line-height:1.2}
.dh-note{font-size:11px;color:rgba(255,255,255,.55);margin-top:3px;font-weight:300;line-height:1.4}
.bday-strip{background:var(--heather);border-radius:8px;padding:6px 11px;margin-top:8px;font-family:'Playfair Display',serif;font-style:italic;font-size:12px;color:#fff;display:flex;align-items:center;gap:7px;line-height:1.3}

.tb{display:flex;gap:0}
.tb-left{display:flex;flex-direction:column;align-items:center;width:50px;flex-shrink:0;padding-top:12px}
.tb-time{font-size:10px;font-weight:500;color:var(--stone);text-align:center;line-height:1.2;font-family:'Source Serif 4',serif}
.tb-dot-col{display:flex;flex-direction:column;align-items:center;margin-top:4px}
.tb-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;border:2px solid var(--cream);box-shadow:0 0 0 1px rgba(0,0,0,.07)}

.tb-title{font-family:'Playfair Display',serif;font-size:14px;font-weight:500;color:var(--ink);line-height:1.3}
.tb-tags{display:flex;gap:4px;flex-wrap:wrap;margin:4px 0 3px}
.tb-tag{font-size:10px;padding:2px 7px;border-radius:20px;font-family:'Source Serif 4',serif;white-space:nowrap}
.tb-tag.s{background:#dce8f5;color:var(--loch)}
.tb-tag.f{background:#daf0e5;color:var(--moss)}
.tb-tag.w{background:#ede8e0;color:var(--stone)}
.tb-tag.c{background:#f5edd5;color:#7a5a10}
.tb-tag.m{background:#ede0f0;color:var(--heather)}
.tb-tag.b{background:linear-gradient(120deg,#f2d2f0,#dfd0f2);color:#5a2a78;font-weight:500}
.tb-meta{font-size:12px;color:var(--stone);line-height:1.55;margin-top:2px;font-weight:300}
.tb-warn{background:#fdf0ee;border-left:2.5px solid #c84040;border-radius:0 7px 7px 0;padding:5px 9px;margin-top:5px;font-size:11px;color:#7a2020;line-height:1.45}
.tb-note{background:#f0ece4;border-radius:7px;padding:5px 9px;margin-top:4px;font-size:11px;color:var(--stone);line-height:1.45}
.diff-add{background:#e5f5e8;border-left:2.5px solid var(--moss);border-radius:0 7px 7px 0;padding:5px 9px;margin-top:4px;font-size:11px;color:#1a3a1a;line-height:1.45}
.diff-chg{background:#fef6de;border-left:2.5px solid var(--gold);border-radius:0 7px 7px 0;padding:5px 9px;margin-top:4px;font-size:11px;color:#5a3a00;line-height:1.45}
.diff-kp{background:#f0ece4;border-left:2.5px solid var(--tartan);border-radius:0 7px 7px 0;padding:5px 9px;margin-top:4px;font-size:11px;color:var(--stone);line-height:1.45}
.map-btn{display:inline-flex;align-items:center;gap:5px;margin-top:6px;padding:5px 11px;border:1px solid var(--border);border-radius:20px;font-size:11px;color:var(--loch);text-decoration:none;font-family:'Source Serif 4',serif;background:rgba(30,58,95,.04)}
.footer{text-align:center;padding:10px 0 3px;font-size:10px;color:var(--border);font-family:'Playfair Display',serif;font-style:italic;letter-spacing:.05em}
.route-card{display:block;margin:10px 13px 4px;background:linear-gradient(135deg,#f7f4ee 0%,#eee9df 100%);border:1px solid var(--border);border-radius:12px;padding:12px 14px 10px;text-decoration:none;color:var(--ink);transition:all .2s}
.route-card:active{transform:scale(.98);background:#eee9df}
.route-hdr{display:flex;align-items:center;gap:6px;font-family:'Playfair Display',serif;font-size:13px;font-weight:600;color:var(--tartan);margin-bottom:8px}
.shell.london-active .route-hdr{color:var(--london-hero)}
.route-stops{display:flex;align-items:center;gap:0;overflow-x:auto;scrollbar-width:none;padding:2px 0 6px}
.route-stops::-webkit-scrollbar{display:none}
.route-stop{display:flex;flex-direction:column;align-items:center;min-width:0;flex-shrink:0;position:relative}
.route-num{width:22px;height:22px;border-radius:50%;background:var(--tartan);color:#fff;font-size:10px;font-weight:600;display:flex;align-items:center;justify-content:center;font-family:'Source Serif 4',serif;flex-shrink:0}
.shell.london-active .route-num{background:var(--london-hero)}
.route-name{font-size:9px;color:var(--stone);text-align:center;max-width:58px;line-height:1.2;margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.route-connector{width:20px;height:2px;background:repeating-linear-gradient(90deg,var(--border) 0,var(--border) 4px,transparent 4px,transparent 7px);margin:0 1px;flex-shrink:0;align-self:flex-start;margin-top:10px}
.route-open{display:flex;align-items:center;justify-content:center;gap:5px;font-size:11px;color:var(--loch);font-family:'Source Serif 4',serif;padding-top:4px;border-top:1px solid rgba(0,0,0,.06);margin-top:2px}
.route-open svg{flex-shrink:0}
.km-tag{display:inline-block;margin-top:5px;font-size:10px;color:#888;background:#f4f1ec;border-radius:10px;padding:1px 7px}
.wx-km{color:#9caf88;font-weight:600;padding-left:8px;border-left:1px solid rgba(255,255,255,.25);margin-left:4px}
.tb-photos{margin-top:8px;display:flex;flex-wrap:wrap;gap:7px}
.ps-card{display:flex;flex-direction:column;align-items:center;text-decoration:none;width:80px;flex-shrink:0}
.ps-thumb{width:80px;height:55px;object-fit:cover;border-radius:5px;display:block}
.ps-placeholder{background:#e8e4db;border-radius:5px;display:flex;align-items:center;justify-content:center}
.ps-placeholder::after{content:'📷';font-size:18px;opacity:.35}
.ps-label{font-size:10px;color:#1e3a5f;text-align:center;line-height:1.3;margin-top:3px;padding:0 2px}
.ps-card:hover .ps-label{color:#3d5a3d;text-decoration:underline}
.wx{font-size:9px;color:#888;margin-top:3px;line-height:1.2;text-align:center;letter-spacing:0}
.wx-hdr{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;padding:6px 12px 2px;font-size:11px;color:var(--stone)}
.wx-hdr-item{display:flex;align-items:center;gap:3px}
</style>
</head>

function setL(l){
  lang=l;
  document.querySelectorAll('.lang-btn').forEach(function(b,i){b.classList.toggle('on',(i===0&&l==='en')||(i===1&&l==='pt'));});
  var t=T[l];
  document.getElementById('ey').textContent=t.ey;
  document.getElementById('tt').textContent=currentTrip==='london_pre'?t.tt_lonpre:currentTrip==='london'?t.tt_london:t.tt_edin;
  document.getElementById('ts').textContent=currentTrip==='london_pre'?t.sub_lonpre:currentTrip==='london'?t.sub_london:t.sub;
  if(currentTrip==='london_pre'){
    t.dows_lonpre.forEach(function(d,i){document.getElementById('dw'+i).textContent=d;});
  } else if(currentTrip==='edinburgh'){
    t.dows.forEach(function(d,i){document.getElementById('dw'+(i+3)).textContent=d;});
  } else {
    t.dows_london.forEach(function(d,i){document.getElementById('dw'+(i+8)).textContent=d;});
  }
  render();
}

function setV(v){
  cv=v;

}

function sd(i){
  cd=i;
  var newTrip=i<=2?'london_pre':i<=7?'edinburgh':'london';
  if(newTrip!==currentTrip){currentTrip=newTrip;updateTriipTheme();}
  document.querySelectorAll('.daybtn').forEach(function(b,j){b.classList.toggle('on',j===i);});
  document.getElementById('content').scrollTop=0;
  render();
}

function updateTriipTheme(){
  var shell=document.querySelector('.shell');
  var t=T[lang];
  if(currentTrip==='london'||currentTrip==='london_pre'){
    shell.classList.add('london-active');
    document.getElementById('tt').textContent=currentTrip==='london_pre'?t.tt_lonpre:t.tt_london;
    document.getElementById('ts').textContent=currentTrip==='london_pre'?t.sub_lonpre:t.sub_london;
  } else {
    shell.classList.remove('london-active');
    document.getElementById('tt').textContent=t.tt_edin;
    document.getElementById('ts').textContent=t.sub;
  }
  // Update day-of-week labels
  if(currentTrip==='london_pre'){
    t.dows_lonpre.forEach(function(d,i){document.getElementById('dw'+i).textContent=d;});
  } else if(currentTrip==='edinburgh'){
    t.dows.forEach(function(d,i){document.getElementById('dw'+(i+3)).textContent=d;});
  } else {
    t.dows_london.forEach(function(d,i){document.getElementById('dw'+(i+8)).textContent=d;});
  }
}

// ── Weather ──────────────────────────────────────────────
var TRIP_DATES=['2026-04-15','2026-04-16','2026-04-17','2026-04-18','2026-04-19'];
var LONDON_DATES=['2026-04-25','2026-04-26'];
var LONPRE_DATES=['2026-04-10','2026-04-11','2026-04-12'];
var wx={},wxLoaded=false,londonWx={},lonPreWx={},lonPreWxLoaded=false;
function wxEmoji(code){
  if(code===0)return'☀️';
  if(code<=2)return'🌤️';
  if(code===3)return'☁️';
  if(code<=48)return'🌫️';
  if(code<=55)return'🌦️';
  if(code<=65)return'🌧️';
  if(code<=77)return'❄️';
  if(code<=82)return'🌦️';
  return'⛈️';
}
function wxBadge(dayIdx,timeStr){
  var isLonPre=dayIdx<=2;
  var isLondon=dayIdx>=8;
  if(isLonPre){
    if(!lonPreWx[LONPRE_DATES[dayIdx]])return'';
    var dp=lonPreWx[LONPRE_DATES[dayIdx]];
    return'<div class="wx">'+dp.emoji+' '+Math.round(dp.hi)+'°C</div>';
  }
  if(isLondon){
    if(!londonWx['2026-04-'+(dayIdx===8?'25':'26')])return'';
    var d=londonWx['2026-04-'+(dayIdx===8?'25':'26')];
    return'<div class="wx">'+d.emoji+' '+Math.round(d.hi)+'°C</div>';
  }
  if(!wxLoaded)return'';
  var date=TRIP_DATES[dayIdx-3];
  if(!date)return'';
  var clean=timeStr.replace(/[^0-9:]/g,'');
  var p=clean.split(':');
  if(!p[0])return'';
  var h=parseInt(p[0]),m=p[1]?parseInt(p[1]):0;
  if(m>=30)h=Math.min(h+1,23);
  var key=date+'-'+String(h).padStart(2,'0');
  var w=wx[key];
  if(!w)return'';
  return'<div class="wx">'+wxEmoji(w.code)+' '+Math.round(w.temp)+'°C</div>';
}
function wxDaySummary(dayIdx,km){
  var isLonPre=dayIdx<=2;
  var isLondon=dayIdx>=8;
  var kmItem=km?'<div class="wx-hdr-item wx-km">🦶 ~'+km.toFixed(1)+' km</div>':'';
  if(isLonPre){
    if(!lonPreWx[LONPRE_DATES[dayIdx]])return kmItem?'<div class="wx-hdr">'+kmItem+'</div>':'';
    var dp=lonPreWx[LONPRE_DATES[dayIdx]];
    return'<div class="wx-hdr"><div class="wx-hdr-item">'+dp.emoji+'</div>'
      +'<div class="wx-hdr-item">↑'+dp.hi+'°C</div>'
      +'<div class="wx-hdr-item">↓'+dp.lo+'°C</div>'
      +kmItem+'</div>';
  }
  if(isLondon){
    var date='2026-04-'+(dayIdx===8?'25':'26');
    if(!londonWx[date])return kmItem?'<div class="wx-hdr">'+kmItem+'</div>':'';
    var d=londonWx[date];
    return'<div class="wx-hdr"><div class="wx-hdr-item">'+d.emoji+'</div>'
      +'<div class="wx-hdr-item">↑'+d.hi+'°C</div>'
      +'<div class="wx-hdr-item">↓'+d.lo+'°C</div>'
      +kmItem+'</div>';
  }
  if(!wxLoaded)return kmItem?'<div class="wx-hdr">'+kmItem+'</div>':'';
  var date=TRIP_DATES[dayIdx-3];
  if(!date)return'';
  var temps=[],codes=[];
  for(var h=7;h<=22;h++){
    var key=date+'-'+String(h).padStart(2,'0');
    if(wx[key]){temps.push(wx[key].temp);codes.push(wx[key].code);}
  }
  if(!temps.length)return kmItem?'<div class="wx-hdr">'+kmItem+'</div>':'';
  var hi=Math.round(Math.max.apply(null,temps));
  var lo=Math.round(Math.min.apply(null,temps));
  var freq={};
  codes.forEach(function(x){freq[x]=(freq[x]||0)+1;});
  var dom=Object.keys(freq).reduce(function(a,b){return freq[a]>freq[b]?a:b;});
  return'<div class="wx-hdr"><div class="wx-hdr-item">'+wxEmoji(parseInt(dom))+'</div>'
    +'<div class="wx-hdr-item">↑'+hi+'°C</div>'
    +'<div class="wx-hdr-item">↓'+lo+'°C</div>'
    +kmItem+'</div>';
}
async function fetchWeather(){
  try{
    var r=await fetch('https://api.open-meteo.com/v1/forecast?latitude=55.9533&longitude=-3.1883&hourly=temperature_2m,weathercode,precipitation_probability&timezone=Europe%2FLondon&start_date=2026-04-15&end_date=2026-04-19');
    var d=await r.json();
    d.hourly.time.forEach(function(t,i){
      var p=t.split('T');
      var hr=p[1].slice(0,2);
      wx[p[0]+'-'+hr]={temp:d.hourly.temperature_2m[i],code:d.hourly.weathercode[i],precip:d.hourly.precipitation_probability[i]};
    });
    wxLoaded=true;
    render();
  }catch(e){}
  // London pre-trip weather (Apr 10-12)
  try{
    var r2=await fetch('https://api.open-meteo.com/v1/forecast?latitude=51.5074&longitude=-0.1278&daily=temperature_2m_max,temperature_2m_min,weathercode&timezone=Europe%2FLondon&start_date=2026-04-10&end_date=2026-04-12');
    var d2=await r2.json();
    d2.daily.time.forEach(function(t,i){
      lonPreWx[t]={hi:Math.round(d2.daily.temperature_2m_max[i]),lo:Math.round(d2.daily.temperature_2m_min[i]),emoji:wxEmoji(d2.daily.weathercode[i])};
    });
    lonPreWxLoaded=true;
    render();
  }catch(e){}
  // London road-trip weather (Apr 25-26)
  try{
    var r3=await fetch('https://api.open-meteo.com/v1/forecast?latitude=51.5074&longitude=-0.1278&daily=temperature_2m_max,temperature_2m_min,weathercode&timezone=Europe%2FLondon&start_date=2026-04-25&end_date=2026-04-26');
    var d3=await r3.json();
    d3.daily.time.forEach(function(t,i){
      londonWx[t]={hi:Math.round(d3.daily.temperature_2m_max[i]),lo:Math.round(d3.daily.temperature_2m_min[i]),emoji:wxEmoji(d3.daily.weathercode[i])};
    });
    render();
  }catch(e){
    londonWx['2026-04-25']={hi:12,lo:3,emoji:'🌦️'};
    londonWx['2026-04-26']={hi:12,lo:5,emoji:'🌤️'};
  }
}
// ─────────────────────────────────────────────────────────
function buildRouteUrl(blocks){
  var places=[];
  blocks.forEach(function(b){
    if(b.url){var m=b.url.match(/[?&]q=([^&]+)/);if(m)places.push(m[1]);}
    if(b.wp){b.wp.forEach(function(w){places.push(w.q);});}
  });
  if(places.length<2)return null;
  return'https://www.google.com/maps/dir/'+places.join('/')+'/';
}
function getRouteStops(blocks,l){
  var stops=[];
  blocks.forEach(function(b){
    if(b.url){
      var m=b.url.match(/[?&]q=([^&]+)/);
      if(m){
        var name=l==='en'?b.ie:b.ip;
        if(name.length>20)name=name.substring(0,18)+'…';
        stops.push(name);
      }
    }
    if(b.wp){b.wp.forEach(function(w){
      var wn=l==='en'?w.ne:w.np;
      if(wn.length>20)wn=wn.substring(0,18)+'…';
      stops.push(wn);
    });}
  });
  return stops;
}
function render(){
  var isLondon=currentTrip==='london';
  var isLonPre=currentTrip==='london_pre';
  var dayData;
  if(isLonPre){
    dayData=D.london_pre.days[cd];
  } else if(isLondon){
    dayData=D.london.days[cd-8];
  } else {
    dayData=D[cv].days[cd-3];
  }
  var isMerged=!isLondon&&!isLonPre&&cv==='merged';
  var l=lang;
  var t=T[l];
  var h='';

  h+='<div class="day-hdr"><div class="dh-in">';
  if(isLondon){
    h+='<div class="dh-eye">'+(l==='en'?dayData.de:dayData.dp)+'</div>';
  } else {
    h+='<div class="dh-eye">'+(l==='en'?dayData.de:dayData.dp)+'</div>';
  }
  h+='<div class="dh-title">'+(l==='en'?dayData.te:dayData.tp)+'</div>';
  h+='<div class="dh-note">'+(l==='en'?dayData.ne:dayData.np)+'</div>';
  var dayKm=(isLondon||isLonPre)?(dayData.kmTotal||dayData.bl.reduce(function(s,b){return s+(b.km||0);},0)):isMerged?dayData.bl.reduce(function(s,b){return s+(b.km||0);},0):0;
  h+=wxDaySummary(cd,dayKm||null);
  if(dayData.bday) h+='<div class="bday-strip">'+(l==='en'?dayData.bne:dayData.bnp)+'</div>';
  h+='</div></div>';
  var _rUrl=buildRouteUrl(dayData.bl);if(_rUrl&&dayData.rm)_rUrl+='?travelmode='+dayData.rm;
  if(_rUrl){
    var _rStops=getRouteStops(dayData.bl,l);
    h+='<a href="'+_rUrl+'" target="_blank" class="route-card">';
    h+='<div class="route-hdr"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 17l6-6 4 4 8-8"/><path d="M17 7h4v4"/></svg>'+(l==='en'?'Day Route':'Rota do Dia')+'</div>';
    h+='<div class="route-stops">';
    _rStops.forEach(function(s,i){
      if(i>0)h+='<div class="route-connector"></div>';
      h+='<div class="route-stop"><div class="route-num">'+(i+1)+'</div><div class="route-name">'+s+'</div></div>';
    });
    h+='</div>';
    h+='<div class="route-open"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/><circle cx="12" cy="9" r="2.5"/></svg>'+(l==='en'?'Open route in Google Maps →':'Abrir rota no Google Maps →')+'</div>';
    h+='</a>';
  }
  h+='<div class="tl">';

  dayData.bl.forEach(function(b,bi){
    var last=bi===dayData.bl.length-1;
    h+='<div class="tb"><div class="tb-left"><div class="tb-time">'+b.t+wxBadge(cd,b.t)+'</div>';
    h+='<div class="tb-dot-col"><div class="tb-dot" style="background:'+b.dot+'"></div>';
    if(!last) h+='<div class="tb-line"></div>';
    h+='</div></div><div class="tb-body">';
    h+='<div class="tb-title">'+(l==='en'?b.ie:b.ip)+'</div>';
    if(b.tg&&b.tg.length){
      h+='<div class="tb-tags">';
      b.tg.forEach(function(k){var r=gtag(k);if(r.label)h+='<span class="tb-tag '+r.cls+'">'+r.label+'</span>';});
      h+='</div>';
    }
    var meta=l==='en'?b.me:b.mp;
    if(meta) h+='<div class="tb-meta">'+meta+'</div>';
    if(b.km) h+='<div class="km-tag">🚶 ~'+b.km+' km</div>';
    if(b.wa) h+='<div class="tb-warn">'+t[b.wa]+'</div>';
    if(b.no) h+='<div class="tb-note">'+t[b.no]+'</div>';
    if(b.ps&&b.ps.length){
      fetchWikiImgs(b.ps);
      h+='<div class="tb-photos">';
      h+=b.ps.map(function(p){
        var key=p.wiki?p.wiki:(p.img?'img:'+p.n:null);var img=key&&wikiImgs[key]?'<img src="'+wikiImgs[key]+'" class="ps-thumb" alt="">':'<div class="ps-thumb ps-placeholder"></div>';
        return'<a href="'+p.l+'" target="_blank" class="ps-card">'+img+'<span class="ps-label">'+p.n+'</span></a>';
      }).join('');
      h+='</div>';
    }
    if(isMerged&&b.df){
      var cls=b.df.k==='add'?'diff-add':b.df.k==='chg'?'diff-chg':'diff-kp';
      var pfx=b.df.k==='add'?t.da:b.df.k==='chg'?t.dc:t.dk;
      h+='<div class="'+cls+'">'+pfx+(l==='en'?b.df.en:b.df.pt)+'</div>';
    }
    if(b.url) h+='<a class="map-btn" href="'+b.url+'" target="_blank"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/><circle cx="12" cy="9" r="2.5"/></svg>'+t.maps+'</a>';
    h+='</div></div>';
  });
  var footerText=isLonPre?'London · April 2026 · Fabio &amp; Liana':isLondon?'Edinburgh &amp; London · April 2026':'Edinburgh April 2026 · Fabio &amp; Liana';
  h+='</div><div class="footer">'+footerText+'</div>';
  document.getElementById('content').innerHTML=h;
}


var wikiImgs={};
var wikiPending={};
function fetchWikiImgs(spots){
  if(!spots||!spots.length) return;
  spots.forEach(function(sp){
    if(!sp.wiki&&sp.img){
      if(wikiImgs['img:'+sp.n]===undefined){ wikiImgs['img:'+sp.n]=sp.img; }
      return;
    }
    if(!sp.wiki) return;
    if(wikiImgs[sp.wiki]!==undefined||wikiPending[sp.wiki]) return;
    wikiPending[sp.wiki]=true;
    fetch('https://en.wikipedia.org/api/rest_v1/page/summary/'+encodeURIComponent(sp.wiki))
      .then(function(r){return r.json();})
      .then(function(d){
        if(d.thumbnail&&d.thumbnail.source){
          wikiImgs[sp.wiki]=d.thumbnail.source;
        } else {
          wikiImgs[sp.wiki]=sp.img||null;
        }
        render();
      })
      .catch(function(){ wikiImgs[sp.wiki]=sp.img||null; render(); });
  });
}

setL('en');
fetchWeather();
