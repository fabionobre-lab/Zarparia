<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#2b4a2b">
<title>Trips — Fabio &amp; Liana</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="assets/icon-192.png">
<link rel="apple-touch-icon" href="assets/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=Source+Serif+4:opsz,wght@8..60,300;8..60,400;8..60,500&display=swap" rel="stylesheet">
<style>
:root{--ink:#1a1208;--stone:#7a6e5f;--gold-lt:#e8c84a;--cream:#faf6ee;--border:#d8ccb8;
  --safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{min-height:100dvh;background:#1e3520;font-family:'Source Serif 4','Georgia',serif;color:var(--ink);-webkit-font-smoothing:antialiased;
  background-image:repeating-linear-gradient(0deg,transparent,transparent 18px,rgba(255,255,255,.04) 18px,rgba(255,255,255,.04) 19.5px),
  repeating-linear-gradient(90deg,transparent,transparent 18px,rgba(255,255,255,.04) 18px,rgba(255,255,255,.04) 19.5px),
  repeating-linear-gradient(0deg,transparent,transparent 54px,rgba(184,134,11,.12) 54px,rgba(184,134,11,.12) 57px),
  repeating-linear-gradient(90deg,transparent,transparent 54px,rgba(184,134,11,.12) 54px,rgba(184,134,11,.12) 57px)}
.wrap{max-width:430px;margin:0 auto;padding:calc(28px + var(--safe-top)) 18px calc(28px + var(--safe-bottom))}
h1{font-family:'Playfair Display',Georgia,serif;font-size:30px;font-weight:700;color:#fff;line-height:1.1}
.sub{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--gold-lt);opacity:.75;font-weight:300;margin-bottom:6px}
.cards{margin-top:22px;display:flex;flex-direction:column;gap:14px}
.card{display:flex;align-items:center;gap:14px;background:var(--cream);border-radius:14px;padding:16px 16px;text-decoration:none;color:var(--ink);box-shadow:0 2px 10px rgba(0,0,0,.25);transition:transform .15s}
.card:active{transform:scale(.98)}
.cover{font-size:30px;width:52px;height:52px;border-radius:12px;background:#efe9dc;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.card-title{font-family:'Playfair Display',serif;font-size:17px;font-weight:700;line-height:1.2}
.card-dates{font-size:11.5px;color:var(--stone);margin-top:3px;font-weight:300}
.chip{margin-left:auto;flex-shrink:0;font-size:9.5px;letter-spacing:.08em;text-transform:uppercase;padding:3px 9px;border-radius:20px}
.chip.past{background:#ede8e0;color:var(--stone)}
.chip.active{background:#daf0e5;color:#1a5a34}
.chip.upcoming{background:#dce8f5;color:#1e3a5f}
.msg{color:rgba(255,255,255,.6);font-size:13px;margin-top:26px;text-align:center}
.legacy{display:block;text-align:center;margin-top:26px;font-size:10.5px;color:rgba(255,255,255,.35);text-decoration:none;font-style:italic;font-family:'Playfair Display',serif}
.legacy:hover{color:rgba(255,255,255,.6)}
</style>
</head>
<body>
<div class="wrap">
  <div class="sub" id="sub"></div>
  <h1 id="h1"></h1>
  <div class="cards" id="cards"></div>
  <a class="legacy" id="legacy" href="legacy.html"></a>
</div>
<script>
'use strict';
/* Trip picker: lists trips from trips/manifest.json. UI strings per language. */
const STRINGS = {
  en: { sub: 'Fabio & Liana', title: 'Trips', past: 'Past', active: 'Now', upcoming: 'Upcoming',
        error: 'Could not load the trip list.', legacy: 'Original UK Spring 2026 page' },
  pt: { sub: 'Fabio & Liana', title: 'Viagens', past: 'Passada', active: 'Agora', upcoming: 'Em breve',
        error: 'Não foi possível carregar a lista de viagens.', legacy: 'Página original UK Spring 2026' },
};
const lang = (navigator.language || 'en').toLowerCase().startsWith('pt') ? 'pt' : 'en';
const S = STRINGS[lang];
const locale = lang === 'pt' ? 'pt-BR' : 'en-GB';

document.getElementById('sub').textContent = S.sub;
document.getElementById('h1').textContent = S.title;
document.getElementById('legacy').textContent = S.legacy;
document.title = S.title + ' — Fabio & Liana';
document.documentElement.lang = lang;

/* Local (not UTC) YYYY-MM-DD, so status chips flip at local midnight (e.g. BST). */
function todayLocal() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
}
function status(t) {
  const today = todayLocal();
  const start = t.dates && t.dates.start, end = t.dates && t.dates.end;
  if (end && end < today) return 'past';
  if (start && start <= today && end && today <= end) return 'active';
  if (start && start > today) return 'upcoming';
  return t.status || 'upcoming';
}
function fmtRange(t) {
  if (!t.dates) return '';
  const f = (iso) => new Intl.DateTimeFormat(locale, { day: 'numeric', month: 'short', year: 'numeric', timeZone: 'UTC' })
    .format(new Date(iso + 'T00:00:00Z'));
  return f(t.dates.start) + ' – ' + f(t.dates.end);
}
fetch('trips/manifest.json')
  .then((r) => r.json())
  .then((list) => {
    document.getElementById('cards').innerHTML = list.map((t) => {
      const st = status(t);
      const title = t.title[lang] !== undefined ? t.title[lang] : Object.values(t.title)[0];
      return `<a class="card" href="app.html?trip=${t.id}">`
        + `<div class="cover">${t.cover || '🧳'}</div>`
        + `<div><div class="card-title">${title}</div><div class="card-dates">${fmtRange(t)}</div></div>`
        + `<span class="chip ${st}">${S[st]}</span></a>`;
    }).join('');
  })
  .catch(() => { document.getElementById('cards').innerHTML = `<div class="msg">${S.error}</div>`; });

if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
</script>
</body>
</html>
