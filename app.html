<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#2b4a2b" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#16120d" media="(prefers-color-scheme: dark)">
<title>Trip</title>
<script>
/* Apply saved light/dark preference before first paint, to avoid a flash of
   the wrong theme. 'auto' (no explicit choice) is left to the CSS media
   query. Kept in sync with the toggle logic in assets/app.js. */
(function () {
  try {
    var t = localStorage.getItem('theme-pref');
    if (t === 'dark' || t === 'light') document.documentElement.setAttribute('data-theme', t);
  } catch (e) {}
})();
</script>
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="assets/icon-192.png">
<link rel="apple-touch-icon" href="assets/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=Source+Serif+4:opsz,wght@8..60,300;8..60,400;8..60,500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/app.css">
</head>
<body>
<div class="shell theme-tartan">
  <div class="hero">
    <div class="hero-inner">
      <div class="hero-row1">
        <div class="hero-row1-left">
          <a class="back-link" id="back-link" href="./"></a>
          <div class="trip-eyebrow" id="ey"></div>
        </div>
        <div class="hero-row1-right">
          <button class="ics-btn" id="ics-btn" onclick="exportIcs()"></button>
          <button class="theme-btn" id="theme-btn" onclick="toggleTheme()"></button>
          <div class="lang-toggle hidden" id="lang-toggle"></div>
        </div>
      </div>
      <div class="trip-title" id="tt"></div>
      <div class="trip-sub" id="ts"></div>
      <div class="vtabs hidden" id="vtabs"></div>
    </div>
  </div>
  <nav class="daynav" id="daynav"></nav>
  <div class="scroll-area" id="content"></div>
</div>
<script src="assets/app.js"></script>
<script>if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');</script>
</body>
</html>
